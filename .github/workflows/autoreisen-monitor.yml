name: AutoReisen price monitor

on:
  schedule:
    # 05:00 UTC = 07:00 peninsular durante el horario de verano.
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AutoReisen monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BASELINE_PRICE: "137.03"
          ALWAYS_NOTIFY: "true"
          PICKUP_DAY: "14"
          PICKUP_MONTH_YEAR: "Sep-2026"
          PICKUP_TIME: "09:00"
          RETURN_DAY: "21"
          RETURN_MONTH_YEAR: "Sep-2026"
          RETURN_TIME: "15:00"
        run: python monitor_autoreisen.py

      - name: Send AutoReisen price to MFE Viajes
        env:
          MFE_WORKER_URL: ${{ secrets.MFE_WORKER_URL }}
          MFE_MONITOR_SECRET: ${{ secrets.MFE_MONITOR_SECRET }}
        run: python post_autoreisen_to_worker.py

      - name: Save price history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state.json || true
          git commit -m "Update AutoReisen price" || echo "No changes"
          git push || true
