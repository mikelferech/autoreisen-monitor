name: Seguimiento diario Vueling MFE Viajes

on:
  workflow_dispatch:
  schedule:
    # 05:10 UTC: diez minutos después del monitor AutoReisen.
    - cron: "10 5 * * *"

permissions:
  contents: read

jobs:
  vueling:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: monitoring
    env:
      MFE_WORKER_URL: ${{ secrets.MFE_WORKER_URL }}
      MFE_MONITOR_SECRET: ${{ secrets.MFE_MONITOR_SECRET }}
      VUELING_SEARCH_URL: ${{ vars.VUELING_SEARCH_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: monitoring/package-lock.json
      - name: Configurar registro público de npm
        run: npm config set registry https://registry.npmjs.org/
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Consultar Vueling
        run: npm run monitor:vueling
      - name: Guardar capturas para diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vueling-${{ github.run_number }}
          path: monitoring/artifacts/
          if-no-files-found: ignore
          retention-days: 14
